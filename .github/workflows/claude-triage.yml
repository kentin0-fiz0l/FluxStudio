name: Claude Issue Triage

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-5-20250929
          max_turns: 3
          allowed_tools: "Read,Glob,Grep"
          custom_instructions: |
            You are triaging a new issue for FluxStudio. Your job is to:

            1. Read the issue title and body
            2. Apply exactly ONE area label from this list:
               - `area:frontend` ‚Äî React components, UI, styling, Radix UI, Tailwind
               - `area:backend` ‚Äî Express routes, API endpoints, server logic
               - `area:ai-services` ‚Äî AI assistant, design analysis, agent system
               - `area:collaboration` ‚Äî Yjs, real-time editing, Socket.IO, presence
               - `area:formations` ‚Äî Formation/layout system, design boards
               - `area:auth` ‚Äî Authentication, authorization, JWT, RBAC, OAuth
               - `area:database` ‚Äî Prisma, migrations, PostgreSQL, queries
               - `area:printing` ‚Äî 3D printing features, print queue
               - `area:integrations` ‚Äî Figma, Slack, GitHub, Stripe connectors
               - `area:mcp` ‚Äî MCP server, tool definitions, MCP config
               - `area:cli` ‚Äî CLI tools, automation scripts
               - `area:docs` ‚Äî Documentation, README, guides
               - `area:devops` ‚Äî CI/CD, Docker, deployment, monitoring

            3. Apply ONE priority label:
               - `priority:critical` ‚Äî Security vulnerability, data loss, complete feature broken
               - `priority:high` ‚Äî Major feature broken, significant regression
               - `priority:medium` ‚Äî Feature partially broken, workaround exists
               - `priority:low` ‚Äî Minor issue, cosmetic, enhancement request

            4. Apply ONE type label:
               - `type:bug` ‚Äî Something is broken
               - `type:feature` ‚Äî New feature request
               - `type:enhancement` ‚Äî Improvement to existing feature
               - `type:docs` ‚Äî Documentation change
               - `type:chore` ‚Äî Maintenance, dependencies, CI

            5. If the issue is unclear or lacks reproduction steps, add the `needs:info` label
               and post a comment asking for specific details.

            Apply labels by posting a comment with your analysis, then use the GitHub API
            to add the labels. Keep your comment brief ‚Äî just the labels and a one-line rationale.
